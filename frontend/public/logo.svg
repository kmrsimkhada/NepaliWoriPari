<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" fill="none">
  <!-- Nepal flag inspired icon - original colors -->
  <g transform="translate(8, 5)">
    <!-- Simplified Nepal flag pennant shape -->
    <path d="M0 50 L0 0 L30 15 L5 15 L30 35 L0 50Z" fill="#DC143C" stroke="#003893" stroke-width="2"/>
    <!-- Moon symbol -->
    <circle cx="14" cy="8" r="4" fill="white"/>
    <!-- Sun symbol -->
    <circle cx="14" cy="26" r="5" fill="white"/>
    <circle cx="14" cy="26" r="3" fill="#DC143C"/>
  </g>
  
  <!-- Exchange arrows icon -->
  <g transform="translate(45, 18)">
    <path d="M0 8 L18 8 M13 3 L18 8 L13 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M18 20 L0 20 M5 15 L0 20 L5 25" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text: NepaliWoriPari -->
  <text x="75" y="30" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white">
    <tspan>Nepali</tspan><tspan fill="#FFD700">Wori</tspan><tspan>Pari</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="75" y="48" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="400" fill="rgba(255,255,255,0.8)">
    Give &amp; Take • Community Services
  </text>
</svg>
